<style>
/* ── Themes ── */
:root {
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --radius: 8px;
  --transition: background 0.2s, color 0.2s, border-color 0.2s;
}

[data-theme="dark"] {
  --bg:         #0e0f11;
  --surface:    #16181c;
  --surface2:   #1e2026;
  --border:     #2a2d35;
  --border2:    #353840;
  --text:       #e8eaf0;
  --muted:      #6b7280;
  --muted2:     #9ca3af;
  --accent:     #4f8ef7;
  --accent-dim: rgba(79,142,247,0.12);
  --accent-dim2:rgba(79,142,247,0.06);
  --tag-bg:     #1e2330;
  --tag-text:   #7ba8f5;
  --tag-border: rgba(79,142,247,0.2);
  --theme-icon: "☀";
}

[data-theme="light"] {
  --bg:         #f8f9fb;
  --surface:    #ffffff;
  --surface2:   #f1f3f6;
  --border:     #dde1e9;
  --border2:    #c8cdd8;
  --text:       #111318;
  --muted:      #8a919e;
  --muted2:     #4b5260;
  --accent:     #1a66f0;
  --accent-dim: rgba(26,102,240,0.08);
  --accent-dim2:rgba(26,102,240,0.04);
  --tag-bg:     #e8eef9;
  --tag-text:   #1a55c4;
  --tag-border: rgba(26,102,240,0.2);
  --theme-icon: "☾";
}

/* system auto handled by JS on load */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  transition: var(--transition);
}
a { color: inherit; text-decoration: none; }

/* ── Layout ── */
.page { max-width: 860px; margin: 0 auto; padding: 0 24px 80px; }

/* ── Header ── */
header {
  padding: 48px 0 36px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.header-left h1 { font-family: var(--mono); font-size: 21px; font-weight: 500; color: var(--text); letter-spacing: -0.3px; margin-bottom: 4px; }
.header-left p { font-size: 13px; color: var(--muted); font-weight: 300; }
.header-left p a { color: var(--accent); border-bottom: 1px solid transparent; transition: border-color 0.15s; }
.header-left p a:hover { border-color: var(--accent); }

.header-right { display: flex; align-items: flex-end; gap: 20px; }
.header-stats { display: flex; gap: 20px; align-items: flex-end; }
.stat { text-align: right; }
.stat-num { font-family: var(--mono); font-size: 24px; font-weight: 500; color: var(--accent); line-height: 1; }
.stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

/* ── Theme switcher ── */
.theme-switcher {
  display: flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  flex-shrink: 0;
  align-self: flex-start;
  margin-top: 4px;
}
.theme-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 5px 10px;
  font-size: 11px;
  font-weight: 500;
  font-family: var(--sans);
  color: var(--muted);
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
  letter-spacing: 0.02em;
}
.theme-btn.active { background: var(--accent-dim); color: var(--accent); }
.theme-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }
.theme-btn .icon { font-size: 12px; margin-right: 3px; }

/* ── Toolbar ── */
.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
.seg { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; flex-shrink: 0; }
.seg-btn { background: none; border: none; cursor: pointer; padding: 7px 16px; font-size: 12px; font-weight: 500; font-family: var(--sans); color: var(--muted2); transition: background 0.15s, color 0.15s; letter-spacing: 0.02em; }
.seg-btn.active { background: var(--accent-dim); color: var(--accent); }
.seg-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }
.search-wrap { flex: 1; min-width: 180px; position: relative; }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: 13px; }
.search-input {
  width: 100%; height: 34px; padding: 0 12px 0 32px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-family: var(--sans); font-size: 13px; outline: none;
  transition: var(--transition), border-color 0.15s;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: var(--border2); }
.result-count { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; padding: 0 4px; }

/* ── Topic pills ── */
.topic-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 22px; }
.topic-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 500; color: var(--muted2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.topic-pill:hover { border-color: var(--border2); color: var(--text); }
.topic-pill.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

/* ── Sections ── */
.section { margin-bottom: 4px; animation: fadeIn 0.18s ease both; }
.section-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: var(--radius); cursor: pointer; user-select: none; transition: background 0.12s; }
.section-header:hover { background: var(--surface); }
.section-label { font-family: var(--mono); font-size: 11.5px; font-weight: 500; color: var(--muted2); letter-spacing: 0.05em; text-transform: uppercase; flex: 1; }
.section-badge { font-family: var(--mono); font-size: 11px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 7px; }
.chevron { color: var(--muted); font-size: 10px; transition: transform 0.2s; flex-shrink: 0; }
.chevron.open { transform: rotate(90deg); }

.article-list { margin: 2px 0 8px; border-left: 1px solid var(--border); margin-left: 14px; }
.article-item { display: flex; align-items: baseline; gap: 10px; padding: 7px 14px 7px 20px; border-radius: 0 var(--radius) var(--radius) 0; transition: background 0.1s; cursor: pointer; }
.article-item:hover { background: var(--accent-dim2); }
.article-item:hover .article-title { color: var(--accent); }
.article-title { font-size: 13.5px; color: var(--muted2); flex: 1; line-height: 1.45; transition: color 0.1s; }
.article-meta { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
.topic-tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: var(--tag-bg); color: var(--tag-text); white-space: nowrap; flex-shrink: 0; border: 1px solid var(--tag-border); }

.empty { text-align: center; padding: 60px 0; color: var(--muted); font-size: 13px; }

/* ── Footer ── */
footer { border-top: 1px solid var(--border); margin-top: 60px; padding-top: 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
footer span { font-family: var(--mono); font-size: 11px; color: var(--muted); }
footer a { color: var(--accent); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

const mq = window.matchMedia('(prefers-color-scheme: dark)');
let currentTheme = localStorage.getItem('theme') || 'auto';

function applyTheme(t) {
  const resolved = t === 'auto' ? (mq.matches ? 'dark' : 'light') : t;
  document.documentElement.setAttribute('data-theme', resolved);
  ['light','dark','auto'].forEach(x => document.getElementById('t-'+x).classList.toggle('active', x === t));
  localStorage.setItem('theme', t);
  currentTheme = t;
}

function setTheme(t) { applyTheme(t); }
mq.addEventListener('change', () => { if (currentTheme === 'auto') applyTheme('auto'); });

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const TOPIC_ORDER = ["MCP","Data Mapper & XSLT","Logic Apps Internals","Testing Logic Apps","Local Dev & Docker","Integrations & Connectivity","Security & Governance","Azure Functions","APIM","Testing",".NET / Web API","BizTalk","BizTalk BRE","BizTalk ESB","AI & Agentic Patterns","Tools & Utilities","Quick Reference"];

let view = 'topic', collapsed = {}, activeTopic = null;

function fmtDate(d) { const [y,m,day]=d.split('-'); return MONTHS[parseInt(m)-1]+' '+parseInt(day)+', '+y; }
function fmtMonth(d) { const [y,m]=d.split('-'); return MONTHS[parseInt(m)-1]+' '+y; }
function monthKey(d) { return d.slice(0,7); }

function setView(v) {
  view=v; activeTopic=null; collapsed={};
  document.getElementById('btn-topic').classList.toggle('active',v==='topic');
  document.getElementById('btn-date').classList.toggle('active',v==='date');
  renderFilters(); render();
}

function setTopic(t) {
  activeTopic=(activeTopic===t)?null:t;
  document.querySelectorAll('.topic-pill').forEach(el=>el.classList.toggle('active',el.dataset.topic===activeTopic));
  render();
}

function toggle(key) { collapsed[key]=!collapsed[key]; render(); }

function filtered() {
  const q=document.getElementById('search').value.toLowerCase();
  return articles.filter(a=>(!activeTopic||a.topic===activeTopic)&&(a.title.toLowerCase().includes(q)||a.topic.toLowerCase().includes(q)));
}

function renderFilters() {
  const el=document.getElementById('topic-filters');
  if(view!=='topic'){el.innerHTML='';return;}
  const topics=TOPIC_ORDER.filter(t=>articles.some(a=>a.topic===t));
  el.innerHTML=topics.map(t=>`<button class="topic-pill${activeTopic===t?' active':''}" data-topic="${t}" onclick="setTopic('${t.replace(/'/g,"\\'")}')">${t}</button>`).join('');
}

function makeSection(key, label, items, showTopic) {
  const isOpen=collapsed[key]!==true;
  const sk=key.replace(/['"&]/g,c=>c==='&'?'and':c==='\''?'\\\'':'\\"');
  let h=`<div class="section"><div class="section-header" onclick="toggle('${sk}')"><span class="section-label">${label}</span><span class="section-badge">${items.length}</span><span class="chevron${isOpen?' open':''}">▶</span></div>`;
  if(isOpen){
    h+='<div class="article-list">';
    items.forEach(a=>{
      const meta=showTopic?`<span class="topic-tag">${a.topic}</span>`:`<span class="article-meta">${fmtDate(a.date)}</span>`;
      h+=`<div class="article-item" onclick="window.open('${a.url}','_blank')"><span class="article-title">${a.title}</span>${meta}</div>`;
    });
    h+='</div>';
  }
  return h+'</div>';
}

function render() {
  const list=filtered();
  document.getElementById('result-count').textContent=list.length+' / '+articles.length;
  if(!list.length){document.getElementById('content').innerHTML='<div class="empty">No articles match.</div>';return;}
  let h='';
  if(view==='topic'){
    const groups={};
    list.forEach(a=>{if(!groups[a.topic])groups[a.topic]=[];groups[a.topic].push(a);});
    const extra=Object.keys(groups).filter(t=>!TOPIC_ORDER.includes(t));
    [...TOPIC_ORDER.filter(t=>groups[t]),...extra].forEach(t=>{
      h+=makeSection(t,t,[...groups[t]].sort((a,b)=>b.date.localeCompare(a.date)),false);
    });
  } else {
    const groups={};
    list.forEach(a=>{const k=monthKey(a.date);if(!groups[k])groups[k]=[];groups[k].push(a);});
    Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(k=>{
      const items=[...groups[k]].sort((a,b)=>b.date.localeCompare(a.date));
      h+=makeSection(k,fmtMonth(items[0].date),items,true);
    });
  }
  document.getElementById('content').innerHTML=h;
}

document.getElementById('total-count').textContent=articles.length;
document.getElementById('topic-count').textContent=[...new Set(articles.map(a=>a.topic))].length;
document.getElementById('footer-updated').textContent='updated '+fmtDate(articles[0].date);
renderFilters(); render();
</script>
