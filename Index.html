<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Daniel Jonathan — Articles</title>

<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2026;
    --border: #2a2d35;
    --border2: #353840;
    --text: #e8eaf0;
    --muted: #6b7280;
    --muted2: #9ca3af;
    --accent: #4f8ef7;
    --accent-dim: rgba(79,142,247,0.12);
    --accent-dim2: rgba(79,142,247,0.06);
    --tag-bg: #1e2330;
    --tag-text: #7ba8f5;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 8px;
    --radius-lg: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  a { color: inherit; text-decoration: none; }

  /* ── Layout ── */
  .page {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ── Header ── */
  header {
    padding: 52px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }

  .header-left p {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
  }

  .header-left p a {
    color: var(--accent);
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .header-left p a:hover { border-color: var(--accent); }

  .header-stats {
    display: flex;
    gap: 20px;
    align-items: flex-end;
  }

  .stat {
    text-align: right;
  }
  .stat-num {
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 500;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .seg {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    flex-shrink: 0;
  }
  .seg-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 7px 16px;
    font-size: 12px;
    font-weight: 500;
    font-family: var(--sans);
    color: var(--muted2);
    transition: background 0.15s, color 0.15s;
    letter-spacing: 0.02em;
  }
  .seg-btn.active {
    background: var(--accent-dim);
    color: var(--accent);
  }
  .seg-btn:hover:not(.active) {
    background: var(--surface2);
    color: var(--text);
  }

  .search-wrap {
    flex: 1;
    min-width: 180px;
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    font-size: 13px;
  }
  .search-input {
    width: 100%;
    height: 34px;
    padding: 0 12px 0 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--border2); }

  .result-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
    padding: 0 4px;
  }

  /* ── Topic filter pills ── */
  .topic-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 24px;
  }
  .topic-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    letter-spacing: 0.01em;
  }
  .topic-pill:hover {
    border-color: var(--border2);
    color: var(--text);
  }
  .topic-pill.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── Sections ── */
  .section { margin-bottom: 4px; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    user-select: none;
    transition: background 0.12s;
  }
  .section-header:hover { background: var(--surface); }

  .section-label {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--muted2);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    flex: 1;
  }

  .section-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 7px;
  }

  .chevron {
    color: var(--muted);
    font-size: 10px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .chevron.open { transform: rotate(90deg); }

  .article-list {
    margin: 2px 0 8px;
    border-left: 1px solid var(--border);
    margin-left: 14px;
    padding-left: 0;
  }

  .article-item {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 8px 14px 8px 20px;
    border-radius: 0 var(--radius) var(--radius) 0;
    transition: background 0.1s;
    cursor: pointer;
  }
  .article-item:hover {
    background: var(--accent-dim2);
  }
  .article-item:hover .article-title {
    color: var(--accent);
  }

  .article-title {
    font-size: 13.5px;
    color: var(--muted2);
    flex: 1;
    line-height: 1.45;
    transition: color 0.1s;
  }

  .article-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .topic-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--tag-bg);
    color: var(--tag-text);
    white-space: nowrap;
    flex-shrink: 0;
    border: 1px solid rgba(79,142,247,0.15);
  }

  /* ── Empty ── */
  .empty {
    text-align: center;
    padding: 60px 0;
    color: var(--muted);
    font-size: 13px;
  }
  .empty-icon { font-size: 28px; margin-bottom: 12px; }

  /* ── Footer ── */
  footer {
    border-top: 1px solid var(--border);
    margin-top: 60px;
    padding-top: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  footer span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }
  footer a { color: var(--accent); }

  /* ── Animations ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .section {
    animation: fadeIn 0.2s ease both;
  }
</style>

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const TOPIC_ORDER = ["MCP","Data Mapper & XSLT","Logic Apps Internals","Testing Logic Apps","Local Dev & Docker","Integrations & Connectivity","Security & Governance","Azure Functions","Testing",".NET / Web API","BizTalk","AI & Agentic Patterns","Tools & Utilities","Quick Reference"];

let view = 'topic';
let collapsed = {};
let activeTopic = null;

function fmtDate(d) {
  const [y,m,day] = d.split('-');
  return MONTHS[parseInt(m)-1] + ' ' + parseInt(day) + ', ' + y;
}
function fmtMonth(d) {
  const [y,m] = d.split('-');
  return MONTHS[parseInt(m)-1] + ' ' + y;
}
function monthKey(d) { return d.slice(0,7); }

function setView(v) {
  view = v;
  activeTopic = null;
  collapsed = {};
  document.getElementById('btn-topic').classList.toggle('active', v==='topic');
  document.getElementById('btn-date').classList.toggle('active', v==='date');
  renderFilters();
  render();
}

function setTopic(t) {
  activeTopic = (activeTopic === t) ? null : t;
  document.querySelectorAll('.topic-pill').forEach(el => {
    el.classList.toggle('active', el.dataset.topic === activeTopic);
  });
  render();
}

function toggle(key) {
  collapsed[key] = !collapsed[key];
  render();
}

function filtered() {
  const q = document.getElementById('search').value.toLowerCase();
  return articles.filter(a =>
    (!activeTopic || a.topic === activeTopic) &&
    (a.title.toLowerCase().includes(q) || a.topic.toLowerCase().includes(q))
  );
}

function renderFilters() {
  const topics = TOPIC_ORDER.filter(t => articles.some(a => a.topic === t));
  const extra = [...new Set(articles.map(a=>a.topic))].filter(t => !TOPIC_ORDER.includes(t));
  const allTopics = [...topics, ...extra];
  const el = document.getElementById('topic-filters');
  if (view !== 'topic') { el.innerHTML = ''; return; }
  el.innerHTML = allTopics.map(t =>
    `<button class="topic-pill${activeTopic===t?' active':''}" data-topic="${t}" onclick="setTopic('${t.replace(/'/g,"\\'")}')">${t}</button>`
  ).join('');
}

function makeSection(key, label, items, showTopic) {
  const isOpen = collapsed[key] !== true;
  let html = `<div class="section">
    <div class="section-header" onclick="toggle('${key.replace(/'/g,"\\'")}')">
      <span class="section-label">${label}</span>
      <span class="section-badge">${items.length}</span>
      <span class="chevron${isOpen?' open':''}">▶</span>
    </div>`;
  if (isOpen) {
    html += '<div class="article-list">';
    items.forEach(a => {
      const meta = showTopic
        ? `<span class="topic-tag">${a.topic}</span>`
        : `<span class="article-meta">${fmtDate(a.date)}</span>`;
      html += `<div class="article-item" onclick="window.open('${a.url}','_blank')">
        <span class="article-title">${a.title}</span>
        ${meta}
      </div>`;
    });
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function render() {
  const list = filtered();
  document.getElementById('result-count').textContent = list.length + ' / ' + articles.length;

  if (list.length === 0) {
    document.getElementById('content').innerHTML =
      '<div class="empty"><div class="empty-icon">○</div>No articles match.</div>';
    return;
  }

  let html = '';
  if (view === 'topic') {
    const groups = {};
    list.forEach(a => { if (!groups[a.topic]) groups[a.topic] = []; groups[a.topic].push(a); });
    const extra = Object.keys(groups).filter(t => !TOPIC_ORDER.includes(t));
    const keys = [...TOPIC_ORDER.filter(t => groups[t]), ...extra];
    keys.forEach(t => {
      const items = [...groups[t]].sort((a,b) => b.date.localeCompare(a.date));
      html += makeSection(t, t, items, false);
    });
  } else {
    const groups = {};
    list.forEach(a => { const k = monthKey(a.date); if (!groups[k]) groups[k] = []; groups[k].push(a); });
    Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(k => {
      const items = [...groups[k]].sort((a,b) => b.date.localeCompare(a.date));
      html += makeSection(k, fmtMonth(items[0].date), items, true);
    });
  }

  document.getElementById('content').innerHTML = html;
}

// Init
document.getElementById('total-count').textContent = articles.length;
document.getElementById('topic-count').textContent = [...new Set(articles.map(a=>a.topic))].length;
document.getElementById('footer-updated').textContent = 'updated ' + fmtDate(articles[0].date);
renderFilters();
render();
</script>
</body>
</html>
